<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Users</title>
</head>
<body>
<form th:action="@{/users/{userId}/update(userId=${user.id})}" method="post" th:object="${user}">
    <label for="name">Name:
        <input id="name" type="text" name="name" th:value="*{name}">
    </label><br>
    <label for="birthday">Birthday:
        <input id="birthday" type="date" name="birthday" th:value="*{birthday}">
    </label><br>
    <label for="email">Email:
        <input id="email" type="text" name="email" th:value="*{email}">
    </label><br>
    <label for="password">Password:
        <input id="password" type="password" name="password" th:value="*{password}">
    </label><br>
    <div th:each="role : ${roles}">
        <input th:id="${role}"
               type="radio"
               name="role"
               th:value="${role.name()}"
               th:checked="${user.role == role}">
        <label th:for="${role}" th:text="${role}">Role name</label>
    </div>
    <div th:each="gender : ${genders}">
        <input th:id="${gender}"
               type="radio"
               name="gender"
               th:value="${gender.name()}"
               th:checked="${user.gender == gender}">
        <label th:for="${gender}" th:text="${gender}">Gender name</label>
    </div>
    <button type="submit">Update</button>
</form>
<form th:action="@{/users/{userId}/delete(userId=${user.id})}" th:if="${user.role.name() == 'ADMIN'}" method="post">
    <button type="submit">Remove</button>
</form>
</body>
</html>
